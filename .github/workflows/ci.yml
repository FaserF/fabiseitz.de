name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fabiseitz.de/package.json

      - name: Install dependencies
        working-directory: ./fabiseitz.de
        run: npm install

      - name: Run i18n tests
        working-directory: ./fabiseitz.de
        run: npm run test:i18n

      - name: Run lint tests
        working-directory: ./fabiseitz.de
        run: npm run lint
